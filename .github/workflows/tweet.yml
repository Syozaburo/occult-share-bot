name: 🔮 オカルト共有Bot - 毎日自動投稿

on:
  schedule:
    # JST 20:00 = UTC 11:00
    - cron: "0 11 * * *"
  
  # 手動実行も可能（テスト用）
  workflow_dispatch:
    inputs:
      dry_run:
        description: "ドライラン（投稿せずにプレビューのみ）"
        required: false
        default: "false"
        type: boolean

jobs:
  tweet:
    name: X (Twitter) に投稿
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🟢 Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 依存関係をインストール
        run: npm ci

      - name: 🔍 投稿プレビュー（ドライラン）
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: npm test

      - name: 🐦 X (Twitter) に投稿
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: npm run post

      - name: ✅ 完了通知
        if: success()
        run: echo "✅ 投稿が完了しました！"

      - name: ❌ エラー通知
        if: failure()
        run: echo "❌ 投稿に失敗しました。Secretsの設定を確認してください。"
